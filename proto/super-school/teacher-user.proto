syntax = "proto3";

package super_school;

import "user.proto";

service TeacherUserService {
  rpc FindTeacherList(FindTeacherListRequest) returns (FindTeacherListResponse);
}

message FindTeacherListRequest {
  int32 page = 1;
  int32 limit = 2;
  optional string name = 3;
  int32 schoolId = 4;
  optional string role = 5;
}

message FindTeacherListResponse {
  repeated UserSimpleInfo data = 1;
  int32 totalCount = 2;
  int32 currentPage = 3;
  int32 limit = 4;
  int32 totalPage = 5;
  bool hasNext = 6;
  bool hasPrev = 7;
}

