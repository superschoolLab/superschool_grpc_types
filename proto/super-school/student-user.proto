syntax = "proto3";

package super_school;

import "user.proto";

service StudentUserService {
  rpc FindStudentList(FindStudentListRequest) returns (FindStudentListResponse);
}

message FindStudentListRequest {
  int32 page = 1;
  int32 limit = 2;
  optional string name = 3;
  int32 schoolId = 4;
}

message FindStudentListResponse {
  repeated UserSimpleInfo data = 1;
  int32 totalCount = 2;
  int32 currentPage = 3;
  int32 limit = 4;
  int32 totalPage = 5;
  bool hasNext = 6;
  bool hasPrev = 7;
}
